<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8" />
    </marker>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #1f2937; }
      .laneTitle { font: 700 14px Arial, sans-serif; fill: #111827; }
      .text { font: 12px Arial, sans-serif; fill: #1f2937; }
      .small { font: 11px Arial, sans-serif; fill: #374151; }
      .note { font: 11px Arial, sans-serif; fill: #7c2d12; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .call { stroke: #2d3748; stroke-width: 1.5; marker-end: url(#arrow); }
      .callBlue { stroke: #1d4ed8; stroke-width: 1.7; marker-end: url(#arrowBlue); }
      .dashed { stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="#f8fafc" />
  <text x="40" y="45" class="title">TechnoApp Selenium Framework - Method Calling Flow</text>
  <text x="40" y="72" class="subtitle">From TestNG annotations to Test scripts, POM classes, BrowserActions wrappers, Selenium API, and utility/config usage</text>

  <rect x="30" y="95" width="1740" height="330" fill="#eef2ff" stroke="#c7d2fe" rx="10" />
  <text x="45" y="123" class="subtitle">A) Annotation lifecycle and bootstrap (actual flow in current code)</text>

  <rect class="box" x="55" y="145" width="280" height="245" />
  <text x="70" y="172" class="laneTitle">TestNG Runner</text>
  <text x="70" y="198" class="text">1) Discover class extending TestBase</text>
  <text x="70" y="220" class="text">2) Invoke @BeforeMethod for each test</text>
  <text x="70" y="242" class="text">3) Run @DataProvider if linked to @Test</text>
  <text x="70" y="264" class="text">4) Execute @Test method</text>
  <text x="70" y="286" class="text">5) @AfterMethod teardown (currently commented in</text>
  <text x="85" y="304" class="text">TestBase, so not auto-invoked now)</text>

  <rect class="box" x="380" y="145" width="330" height="245" />
  <text x="395" y="172" class="laneTitle">TestBase / Test Class</text>
  <text x="395" y="198" class="text">@BeforeMethod setup()</text>
  <text x="395" y="220" class="text">- PropertyOperations(config.properties)</text>
  <text x="395" y="242" class="text">- BrowserActions.start(URL)</text>
  <text x="395" y="264" class="text">- LoginPage.doLogin()</text>
  <text x="395" y="286" class="text">@Test in Tc1/Tc2_1/Tc3/Tc4</text>
  <text x="395" y="308" class="text">@DataProvider in Tc3/Tc4 reads Excel</text>
  <text x="395" y="330" class="text">tearDown(result) captures screenshot on fail</text>

  <rect class="box" x="755" y="145" width="300" height="245" />
  <text x="770" y="172" class="laneTitle">Config + Utility Layer</text>
  <text x="770" y="198" class="text">PropertyOperations.getValue()</text>
  <text x="770" y="220" class="text">- URL / STUDENTID / ACCESSCODE</text>
  <text x="770" y="242" class="text">ExcelOperations.readExcel()</text>
  <text x="770" y="264" class="text">DateTimeUtility.getCurrentDateTime()</text>
  <text x="770" y="286" class="text">Used by data-driven and assertion flows</text>

  <rect class="box" x="1100" y="145" width="290" height="245" />
  <text x="1115" y="172" class="laneTitle">POM Layer</text>
  <text x="1115" y="198" class="text">LoginPage, FindFoodPage, RestauarantMenuPage,</text>
  <text x="1115" y="216" class="text">OrderSummary_CheckoutPage, PaymentPage, ...</text>
  <text x="1115" y="238" class="text">Each page maps business actions to locators</text>
  <text x="1115" y="260" class="text">and delegates Selenium actions</text>

  <rect class="box" x="1435" y="145" width="300" height="245" />
  <text x="1450" y="172" class="laneTitle">BrowserActions + Selenium</text>
  <text x="1450" y="198" class="text">start(), waitFor..., clickOnElement(),</text>
  <text x="1450" y="216" class="text">setTextOnElement(), takeScreenshot(), quitBrowser()</text>
  <text x="1450" y="238" class="text">Internally uses WebDriver, WebDriverWait,</text>
  <text x="1450" y="256" class="text">ExpectedConditions, Actions</text>

  <line x1="335" y1="220" x2="380" y2="220" class="call" />
  <line x1="710" y1="220" x2="755" y2="220" class="call" />
  <line x1="710" y1="286" x2="1100" y2="286" class="call" />
  <line x1="1390" y1="260" x2="1435" y2="260" class="call" />

  <rect x="30" y="450" width="1740" height="710" fill="#ecfeff" stroke="#a5f3fc" rx="10" />
  <text x="45" y="478" class="subtitle">B) Sequence view (example: Tc2_1 / Tc3 order flow)</text>

  <rect x="60" y="500" width="220" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />
  <rect x="300" y="500" width="240" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />
  <rect x="560" y="500" width="260" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />
  <rect x="840" y="500" width="270" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />
  <rect x="1130" y="500" width="260" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />
  <rect x="1410" y="500" width="320" height="620" fill="#ffffff" stroke="#cbd5e1" rx="8" />

  <text x="95" y="527" class="laneTitle">TestNG</text>
  <text x="330" y="527" class="laneTitle">Test Class</text>
  <text x="590" y="527" class="laneTitle">POM: Login/FindFood/...</text>
  <text x="870" y="527" class="laneTitle">BrowserActions</text>
  <text x="1160" y="527" class="laneTitle">WebDriver + DOM</text>
  <text x="1440" y="527" class="laneTitle">Utilities/Files</text>

  <line x1="170" y1="540" x2="170" y2="1110" stroke="#94a3b8" />
  <line x1="420" y1="540" x2="420" y2="1110" stroke="#94a3b8" />
  <line x1="690" y1="540" x2="690" y2="1110" stroke="#94a3b8" />
  <line x1="975" y1="540" x2="975" y2="1110" stroke="#94a3b8" />
  <line x1="1260" y1="540" x2="1260" y2="1110" stroke="#94a3b8" />
  <line x1="1570" y1="540" x2="1570" y2="1110" stroke="#94a3b8" />

  <text x="80" y="570" class="text">@BeforeMethod</text>
  <line x1="170" y1="580" x2="420" y2="580" class="callBlue" />
  <text x="260" y="574" class="small">invoke setup()</text>

  <line x1="420" y1="620" x2="1570" y2="620" class="call" />
  <text x="820" y="612" class="small">PropertyOperations(config.properties) - get URL</text>

  <line x1="420" y1="660" x2="975" y2="660" class="callBlue" />
  <text x="590" y="654" class="small">BrowserActions.start(url)</text>
  <line x1="975" y1="690" x2="1260" y2="690" class="call" />
  <text x="1040" y="684" class="small">new ChromeDriver(), driver.get(url)</text>

  <line x1="420" y1="730" x2="690" y2="730" class="callBlue" />
  <text x="485" y="724" class="small">new LoginPage().doLogin()</text>

  <line x1="690" y1="765" x2="1570" y2="765" class="call" />
  <text x="980" y="759" class="small">read STUDENTID, ACCESSCODE</text>

  <line x1="690" y1="800" x2="975" y2="800" class="call" />
  <text x="740" y="794" class="small">setTextOnElement(), clickOnElement()</text>
  <line x1="975" y1="830" x2="1260" y2="830" class="call" />
  <text x="1035" y="824" class="small">wait + sendKeys/click on DOM</text>

  <text x="80" y="870" class="text">@DataProvider (Tc3/Tc4)</text>
  <line x1="170" y1="880" x2="420" y2="880" class="call dashed" />
  <line x1="420" y1="910" x2="1570" y2="910" class="call dashed" />
  <text x="860" y="902" class="small">ExcelOperations.readExcel(file, sheet) -> Object[][]</text>

  <text x="80" y="955" class="text">@Test verifyPlaceOrderFeature(...)</text>
  <line x1="170" y1="965" x2="420" y2="965" class="callBlue" />
  <line x1="420" y1="995" x2="690" y2="995" class="callBlue" />
  <text x="460" y="989" class="small">FindFoodPage + other pages</text>

  <line x1="690" y1="1025" x2="975" y2="1025" class="call" />
  <text x="735" y="1019" class="small">POM methods call wrapper methods</text>

  <line x1="975" y1="1055" x2="1260" y2="1055" class="call" />
  <text x="1045" y="1049" class="small">WebDriver interactions happen</text>

  <line x1="690" y1="1085" x2="1570" y2="1085" class="call dashed" />
  <text x="970" y="1079" class="small">DateTimeUtility.getCurrentDateTime() for asserts</text>

  <text x="80" y="1135" class="note">Note: @AfterMethod in TestBase is currently commented. If enabled, flow is: TestNG -> tearDown(ITestResult) -> takeScreenshot(on fail) -> quitBrowser().</text>
</svg>
