<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>

    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0b1220; }
      .subtitle { font: 600 17px Arial, sans-serif; fill: #1e293b; }
      .sectionTitle { font: 700 18px Arial, sans-serif; fill: #1e293b; }
      .laneTitle { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .text { font: 12px Arial, sans-serif; fill: #1f2937; }
      .small { font: 11px Arial, sans-serif; fill: #334155; }
      .note { font: 11px Arial, sans-serif; fill: #7c2d12; }

      .sectionA { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; }
      .sectionB { fill: #ccfbf1; stroke: #14b8a6; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #64748b; stroke-width: 1.25; }

      .call { stroke: #1f2937; stroke-width: 1.7; marker-end: url(#arrow); }
      .callBlue { stroke: #1d4ed8; stroke-width: 2; marker-end: url(#arrowBlue); }
      .dashed { stroke-dasharray: 6 4; }

      .laneLine { stroke: #64748b; stroke-width: 1; }
      .legendBox { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; }
      .seq { font: 700 11px Arial, sans-serif; fill: #1d4ed8; }
      .seqUtil { font: 700 11px Arial, sans-serif; fill: #7c2d12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="url(#bgGrad)" />

  <text x="900" y="50" class="title" text-anchor="middle">Technocredits Framework</text>
  <text x="40" y="76" class="subtitle">High-level 3 layers: Test Cases, POM (Page classes), BrowserActions (Wrapper) with utility/config usage</text>

  <rect x="30" y="100" width="1740" height="338" class="sectionA" rx="12" />
  <text x="48" y="130" class="sectionTitle">A) Annotation lifecycle and bootstrap (actual flow in current code)</text>

  <rect class="card" x="55" y="152" width="280" height="248" rx="10" />
  <text x="70" y="178" class="laneTitle">TestNG Runner</text>
  <text x="70" y="204" class="text">1) Discover class extending TestBase</text>
  <text x="70" y="226" class="text">2) Invoke @BeforeMethod for each test</text>
  <text x="70" y="248" class="text">3) Run @DataProvider if linked to @Test</text>
  <text x="70" y="270" class="text">4) Execute @Test method</text>
  <text x="70" y="292" class="text">5) @AfterMethod teardown (currently commented in</text>
  <text x="85" y="310" class="text">TestBase, so not auto-invoked now)</text>

  <rect class="card" x="380" y="152" width="330" height="248" rx="10" />
  <text x="395" y="178" class="laneTitle">TestBase / Test Class</text>
  <text x="395" y="204" class="text">@BeforeMethod setup()</text>
  <text x="395" y="226" class="text">- PropertyOperations(config.properties)</text>
  <text x="395" y="248" class="text">- BrowserActions.start(URL)</text>
  <text x="395" y="270" class="text">- LoginPage.doLogin()</text>
  <text x="395" y="292" class="text">@Test example shown: TC4.verifyPlaceOrderFeature(data)</text>
  <text x="395" y="314" class="text">@DataProvider in TC4 reads Excel</text>
  <text x="395" y="336" class="text">tearDown(result) captures screenshot on fail</text>

  <rect class="card" x="755" y="152" width="300" height="248" rx="10" />
  <text x="770" y="178" class="laneTitle">Config + Utility Layer</text>
  <text x="770" y="204" class="text">PropertyOperations.getValue()</text>
  <text x="770" y="226" class="text">- URL / STUDENTID / ACCESSCODE</text>
  <text x="770" y="248" class="text">ExcelOperations.readExcel()</text>
  <text x="770" y="270" class="text">DateTimeUtility.getCurrentDateTime()</text>
  <text x="770" y="292" class="text">Used by data-driven and assertion flows</text>

  <rect class="card" x="1100" y="152" width="290" height="248" rx="10" />
  <text x="1115" y="178" class="laneTitle">POM Layer (Page classes + elements)</text>
  <text x="1115" y="204" class="text">LoginPage, FindFoodPage, RestauarantMenuPage,</text>
  <text x="1115" y="222" class="text">OrderSummary_CheckoutPage, PaymentPage, ...</text>
  <text x="1115" y="244" class="text">Elements/locators are written in page classes</text>
  <text x="1115" y="266" class="text">and page methods delegate actions to wrappers</text>

  <rect class="card" x="1435" y="152" width="300" height="248" rx="10" />
  <text x="1450" y="178" class="laneTitle">BrowserActions (Wrapper)</text>
  <text x="1450" y="204" class="text">start(), waitFor..., clickOnElement(),</text>
  <text x="1450" y="222" class="text">setTextOnElement(), takeScreenshot(), quitBrowser()</text>
  <text x="1450" y="244" class="text">Internally uses WebDriver, WebDriverWait,</text>
  <text x="1450" y="262" class="text">ExpectedConditions, Actions</text>

  <line x1="335" y1="224" x2="380" y2="224" class="call" />
  <line x1="710" y1="224" x2="755" y2="224" class="call" />
  <line x1="710" y1="292" x2="1100" y2="292" class="call" />
  <line x1="1390" y1="266" x2="1435" y2="266" class="call" />

  <rect x="30" y="458" width="1740" height="714" class="sectionB" rx="12" />
  <text x="48" y="488" class="sectionTitle">B) Sequence view (example: TC4 order flow with wrapper delegation)</text>

  <rect x="60" y="510" width="220" height="624" class="card" rx="10" />
  <rect x="300" y="510" width="240" height="624" class="card" rx="10" />
  <rect x="560" y="510" width="260" height="624" class="card" rx="10" />
  <rect x="840" y="510" width="270" height="624" class="card" rx="10" />
  <rect x="1130" y="510" width="260" height="624" class="card" rx="10" />
  <rect x="1410" y="510" width="320" height="624" class="card" rx="10" />

  <text x="95" y="538" class="laneTitle">TestNG</text>
  <text x="330" y="538" class="laneTitle">Test Class</text>
  <text x="590" y="538" class="laneTitle">POM: Login/FindFood/...</text>
  <text x="870" y="538" class="laneTitle">BrowserActions</text>
  <text x="1160" y="538" class="laneTitle">WebDriver + DOM</text>
  <text x="1440" y="538" class="laneTitle">Utilities/Files</text>

  <line x1="170" y1="548" x2="170" y2="1120" class="laneLine" />
  <line x1="420" y1="548" x2="420" y2="1120" class="laneLine" />
  <line x1="690" y1="548" x2="690" y2="1120" class="laneLine" />
  <line x1="975" y1="548" x2="975" y2="1120" class="laneLine" />
  <line x1="1260" y1="548" x2="1260" y2="1120" class="laneLine" />
  <line x1="1570" y1="548" x2="1570" y2="1120" class="laneLine" />

  <text x="80" y="578" class="text">@BeforeMethod</text>
  <line x1="170" y1="588" x2="420" y2="588" class="callBlue" />
  <text x="292" y="602" class="seq">[1]</text>
  <text x="260" y="582" class="small">invoke setup()</text>

  <line x1="420" y1="628" x2="1570" y2="628" class="call" />
  <text x="985" y="642" class="seq">[2]</text>
  <text x="820" y="620" class="small">PropertyOperations(config.properties) - get URL</text>

  <line x1="420" y1="668" x2="975" y2="668" class="callBlue" />
  <text x="690" y="682" class="seq">[3]</text>
  <text x="590" y="662" class="small">BrowserActions.start(url)</text>
  <line x1="975" y1="698" x2="1260" y2="698" class="call" />
  <text x="1110" y="712" class="seq">[4]</text>
  <text x="1040" y="692" class="small">new ChromeDriver(), driver.get(url)</text>

  <line x1="420" y1="738" x2="690" y2="738" class="callBlue" />
  <text x="540" y="752" class="seq">[5]</text>
  <text x="485" y="732" class="small">new LoginPage().doLogin()</text>

  <line x1="690" y1="773" x2="1570" y2="773" class="call" />
  <text x="1120" y="787" class="seq">[6]</text>
  <text x="980" y="767" class="small">LoginPage reads STUDENTID/ACCESSCODE from config</text>

  <line x1="690" y1="808" x2="975" y2="808" class="call" />
  <text x="818" y="822" class="seq">[7]</text>
  <text x="740" y="802" class="small">setTextOnElement(), clickOnElement()</text>
  <line x1="975" y1="838" x2="1260" y2="838" class="call" />
  <text x="1110" y="852" class="seq">[8]</text>
  <text x="1035" y="832" class="small">wait + sendKeys/click on DOM</text>

  <text x="80" y="878" class="text">@DataProvider (TC4)</text>
  <line x1="170" y1="888" x2="420" y2="888" class="call dashed" />
  <text x="292" y="902" class="seqUtil">[9]</text>
  <line x1="420" y1="918" x2="1570" y2="918" class="call dashed" />
  <text x="985" y="932" class="seqUtil">[10]</text>
  <text x="860" y="910" class="small">ExcelOperations.readExcel(file, sheet) -&gt; Object[][] (only when @Test uses dataProvider)</text>

  <text x="80" y="963" class="text">@Test TC4.verifyPlaceOrderFeature(...)</text>
  <line x1="170" y1="973" x2="420" y2="973" class="callBlue" />
  <text x="292" y="987" class="seq">[11]</text>
  <line x1="420" y1="1003" x2="690" y2="1003" class="callBlue" />
  <text x="540" y="1017" class="seq">[12]</text>
  <text x="460" y="997" class="small">POM page methods (elements in pages) -&gt; wrapper calls</text>

  <line x1="690" y1="1033" x2="975" y2="1033" class="call" />
  <text x="818" y="1047" class="seq">[13]</text>
  <text x="735" y="1027" class="small">POM methods call wrapper methods</text>

  <line x1="975" y1="1063" x2="1260" y2="1063" class="call" />
  <text x="1110" y="1077" class="seq">[14]</text>
  <text x="1045" y="1057" class="small">WebDriver interactions happen</text>

  <line x1="690" y1="1093" x2="1570" y2="1093" class="call dashed" />
  <text x="1120" y="1107" class="seqUtil">[15]</text>
  <text x="970" y="1087" class="small">DateTimeUtility.getCurrentDateTime() for asserts</text>

  <rect x="60" y="1140" width="1670" height="24" class="legendBox" rx="6" />
  <text x="80" y="1156" class="note">Note: @AfterMethod in TestBase is currently commented. If enabled, flow is: TestNG -&gt; tearDown(ITestResult) -&gt; takeScreenshot(on fail) -&gt; quitBrowser().</text>
</svg>
